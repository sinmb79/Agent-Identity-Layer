# Fly.io deployment configuration for 22B Labs AIL Issuance Server
# Deploy: fly deploy

app = "22blabs-ail"
primary_region = "nrt"   # Tokyo — change to your preferred region

[build]

[env]
  PORT        = "8080"
  HOST        = "0.0.0.0"
  NODE_ENV    = "production"
  AIL_DB_PATH = "/data/ail.db"
  AIL_BASE_URL = "https://22blabs-ail.fly.dev"

# Secrets (set via: fly secrets set KEY=value)
# Required:
#   AIL_MASTER_KEY_JSON   — JSON content of data/master-key.json (or use volume)
#   ADMIN_API_KEY         — Admin API key for dashboard
# Optional (on-chain NFT):
#   CHAIN_RPC_URL         — Alchemy RPC URL
#   CHAIN_PRIVATE_KEY     — Minter wallet private key
#   NFT_CONTRACT_ADDRESS  — Deployed AILIdentity contract address
# Optional (email):
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / EMAIL_FROM

[[services]]
  protocol      = "tcp"
  internal_port = 8080

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[services.tcp_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"

  [[services.http_checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/health"

# Persistent volume for SQLite database
[[mounts]]
  source      = "ail_data"
  destination = "/data"
