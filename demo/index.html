<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Identity Fingerprint</title>
  <style>
    :root {
      --bg: #07101f;
      --panel: #0f1b33;
      --line: #24385e;
      --text: #edf2ff;
      --muted: #9fb0d9;
      --blue: #60a5fa;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --violet: #a78bfa;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: radial-gradient(circle at top, #12254a 0%, var(--bg) 48%); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1, h2, h3, p { margin: 0; }
    .sub { color: var(--muted); margin-top: 8px; margin-bottom: 18px; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 18px; }
    .panel { background: rgba(15,27,51,.92); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.22); }
    .examples button { width: 100%; margin-bottom: 10px; border: 1px solid #35528a; background: #142448; color: white; border-radius: 12px; padding: 12px; text-align: left; cursor: pointer; }
    .examples button:hover { background: #1b2f5d; }
    .stage { display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; }
    .hero { display: grid; grid-template-columns: 300px 1fr; gap: 18px; }
    .fingerprint-wrap { display:flex; align-items:center; justify-content:center; }
    .identity-card { display:grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-top: 14px; }
    .mini { background: #0a1429; border: 1px solid #20345a; border-radius: 12px; padding: 12px; }
    .mini .k { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .mini .v { font-size: 14px; font-weight: 600; word-break: break-word; }
    .lineage { margin-top: 18px; display:flex; gap: 10px; align-items:center; flex-wrap: wrap; }
    .node { padding: 10px 14px; border-radius: 999px; border: 1px solid #375488; background:#14264d; }
    .arrow { color: var(--muted); }
    .bars { display:grid; gap: 12px; margin-top: 14px; }
    .bar label { display:flex; justify-content:space-between; color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .track { height: 12px; background:#091224; border:1px solid #223861; border-radius:999px; overflow:hidden; }
    .fill { height:100%; border-radius:999px; }
    .pill-row { margin-top: 10px; display:flex; gap:8px; flex-wrap: wrap; }
    .pill { padding: 6px 10px; border-radius: 999px; font-size: 12px; border:1px solid #35528a; background:#132346; }
    pre { margin-top: 16px; white-space: pre-wrap; word-break: break-word; background:#081121; border:1px solid #20345a; padding: 14px; border-radius: 14px; max-height: 280px; overflow:auto; }
    .caption { color: var(--muted); font-size: 13px; margin-top: 10px; }
    svg { max-width: 100%; height: auto; }
    @media (max-width: 980px) {
      .layout, .stage, .hero { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agent Identity Fingerprint</h1>
    <p class="sub">22B Labs · first public project · visual identity signal board</p>
    <div class="layout">
      <div class="panel examples">
        <h3>Examples</h3>
        <div style="height:10px"></div>
        <button data-file="single-agent.local.json">Single agent</button>
        <button data-file="delegated-coding-agent.json">Delegated coding agent</button>
        <button data-file="tool-call.signed-placeholder.json">Signed tool-call placeholder</button>
      </div>
      <div class="stage">
        <div class="panel">
          <div class="hero">
            <div class="fingerprint-wrap">
              <svg id="fingerprint" viewBox="0 0 260 320" aria-label="identity fingerprint"></svg>
            </div>
            <div>
              <h2 id="title">Loading...</h2>
              <p id="summary" class="sub">Visual identity pattern</p>
              <div class="pill-row">
                <span class="pill" id="pVersion"></span>
                <span class="pill" id="pMode"></span>
                <span class="pill" id="pVerification"></span>
              </div>
              <div class="identity-card" id="cards"></div>
            </div>
          </div>
          <div class="lineage" id="lineage"></div>
          <div class="caption">The fingerprint shape changes by delegation depth, verification strength, scope, and risk posture.</div>
        </div>
        <div class="panel">
          <h2>Signal board</h2>
          <div class="bars" id="bars"></div>
          <pre id="raw"></pre>
        </div>
      </div>
    </div>
  </div>
  <script>
    const title = document.getElementById('title');
    const summary = document.getElementById('summary');
    const cards = document.getElementById('cards');
    const bars = document.getElementById('bars');
    const raw = document.getElementById('raw');
    const lineage = document.getElementById('lineage');
    const pVersion = document.getElementById('pVersion');
    const pMode = document.getElementById('pMode');
    const pVerification = document.getElementById('pVerification');
    const svg = document.getElementById('fingerprint');

    function scoreVerification(v) {
      return ({ self_asserted: 28, local_runtime_asserted: 54, platform_asserted: 76, cryptographically_signed: 96 }[v] || 40);
    }
    function scoreDelegation(depth) { return Math.max(10, 90 - depth * 22); }
    function scoreScope(scope) {
      let n = 40;
      if (scope.network === 'none') n += 18;
      if (scope.network === 'restricted') n += 8;
      if (scope.secrets === 'none') n += 18;
      if (scope.write_access === false) n += 14;
      return Math.min(100, n);
    }
    function scoreRisk(scope) {
      let r = 30;
      if (scope.write_access) r += 20;
      if (scope.network === 'allowed') r += 30;
      if (scope.network === 'restricted') r += 15;
      if (scope.secrets === 'indirect') r += 15;
      if (scope.secrets === 'direct') r += 30;
      return Math.min(100, r);
    }

    function renderBars(items) {
      bars.innerHTML = items.map(({label, value, color}) => `
        <div class="bar">
          <label><span>${label}</span><span>${value}</span></label>
          <div class="track"><div class="fill" style="width:${value}%; background:${color}"></div></div>
        </div>
      `).join('');
    }

    function drawFingerprint(data, metrics) {
      const depth = data.delegation.chain_depth || 0;
      const rings = 7;
      const cx = 130, cy = 160;
      const color = data.verification.signed ? '#34d399' : (data.verification.strength === 'platform_asserted' ? '#60a5fa' : '#a78bfa');
      let paths = '';
      for (let i = 0; i < rings; i++) {
        const ry = 110 - i * 12;
        const rx = 78 - i * 8 + depth * 3;
        const wobble = 6 + i * 1.5;
        let d = '';
        for (let a = 0; a <= Math.PI * 2 + 0.01; a += 0.12) {
          const w = Math.sin(a * (2 + depth) + i) * wobble;
          const x = cx + Math.cos(a) * (rx + w);
          const y = cy + Math.sin(a) * (ry + w * 0.65);
          d += (a === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
        }
        paths += `<path d="${d}Z" fill="none" stroke="${color}" stroke-opacity="${0.24 + i*0.08}" stroke-width="${1.6 + i*0.12}" />`;
      }
      const core = `<circle cx="${cx}" cy="${cy}" r="26" fill="${color}" fill-opacity="0.18" stroke="${color}" stroke-width="2" />`;
      const text = `<text x="${cx}" y="${cy+4}" fill="#eef2ff" font-size="11" text-anchor="middle">${data.agent.display_name}</text>`;
      const badges = `
        <text x="18" y="24" fill="#9fb0d9" font-size="12">Verification ${metrics.verification}</text>
        <text x="18" y="42" fill="#9fb0d9" font-size="12">Scope ${metrics.scope}</text>
        <text x="18" y="60" fill="#9fb0d9" font-size="12">Risk ${metrics.risk}</text>`;
      svg.innerHTML = `<rect x="0" y="0" width="260" height="320" rx="24" fill="#091224" stroke="#24385e" />${paths}${core}${text}${badges}`;
    }

    async function loadExample(file) {
      const res = await fetch(`../examples/${file}`);
      const data = await res.json();
      const metrics = {
        verification: scoreVerification(data.verification.strength),
        delegation: scoreDelegation(data.delegation.chain_depth || 0),
        scope: scoreScope(data.scope),
        risk: scoreRisk(data.scope)
      };
      title.textContent = `${data.agent.display_name} fingerprint`;
      summary.textContent = `${data.agent.role} · ${data.delegation.mode} · ${data.verification.strength}`;
      pVersion.textContent = data.version;
      pMode.textContent = data.delegation.mode;
      pVerification.textContent = data.verification.strength;
      cards.innerHTML = [
        ['Owner', `${data.agent.owner.type}:${data.agent.owner.id}`],
        ['Provider', data.agent.provider],
        ['Task', data.delegation.task_ref || '-'],
        ['Surface', data.runtime.surface || '-'],
        ['Workspace', (data.scope.workspace || [])[0] || '-'],
        ['Repos', (data.scope.repos || []).join(', ') || '-']
      ].map(([k,v]) => `<div class="mini"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
      lineage.innerHTML = '';
      const nodes = [];
      if (data.delegation.delegated_by?.agent_id) nodes.push(data.delegation.delegated_by.agent_id);
      nodes.push(data.agent.id);
      lineage.innerHTML = nodes.map((n, i) => `${i ? '<span class="arrow">→</span>' : ''}<span class="node">${n}</span>`).join('');
      renderBars([
        { label: 'Verification strength', value: metrics.verification, color: '#60a5fa' },
        { label: 'Delegation clarity', value: metrics.delegation, color: '#a78bfa' },
        { label: 'Scope tightness', value: metrics.scope, color: '#34d399' },
        { label: 'Operational risk', value: metrics.risk, color: '#fbbf24' }
      ]);
      drawFingerprint(data, metrics);
      raw.textContent = JSON.stringify(data, null, 2);
    }

    document.querySelectorAll('button[data-file]').forEach(btn => btn.addEventListener('click', () => loadExample(btn.dataset.file)));
    loadExample('single-agent.local.json');
  </script>
</body>
</html>
